allure.results.directory=target/allure-results

# Widget configuration
allure.report.timeline.enabled=true
allure.report.status.chart.enabled=true
allure.report.failed.tests.enabled=true
allure.report.duration.enabled=true
allure.report.flaky.enabled=true
allure.report.retries.enabled=true

# Report ordering
allure.report.order.by=severity,name,start

# History tracking
allure.report.history.enabled=true
allure.report.history.max=100

# Categories configuration
allure.report.categories.enabled=true
